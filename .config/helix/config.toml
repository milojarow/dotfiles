# Helix — mirrors the vim lightline statusline layout
# (left: mode | readonly modified absolute-path,
# right: line:total | percent | line-ending encoding filetype).
# vim's "paste" indicator has no helix equivalent (bracketed paste, no paste mode).
#
# base16_transparent paints with the terminal's 16 ANSI colors and keeps foot's
# background, so helix follows the live palette-theming system (man palette-theming)
# the same way plain-cterm vim does.

theme = "base16_transparent"

[editor.statusline]
left = [
  "mode",
  "read-only-indicator",
  "file-modification-indicator",
  "file-absolute-path",
]
center = []
right = [
  "position",
  "total-line-numbers",
  "position-percentage",
  "file-line-ending",
  "file-encoding",
  "file-type",
]

# Match lightline's mode wording (helix defaults are NOR/INS/SEL).
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"
