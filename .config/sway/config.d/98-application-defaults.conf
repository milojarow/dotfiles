# don't show gaps if there's only one window on the desktop
smart_gaps off

# set floating mode for generated windows
for_window [title="(?:Open|Save) (?:File|Folder|As)"] floating enable
for_window [title="(?:Open|Save) (?:File|Folder|As)"] resize set 800 600
for_window [window_role="pop-up"] floating enable
for_window [window_role="bubble"] floating enable
for_window [window_role="task_dialog"] floating enable
for_window [window_role="Preferences"] floating enable
for_window [window_type="dialog"] floating enable
for_window [window_type="menu"] floating enable

# set floating mode for specific applications
# Altus (WhatsApp/Electron): born floating so it never first renders as a tiling
# window — otherwise as the sole window it grabs the whole workspace, or splits
# to the right and then visibly jumps left when the daemon floats it. Born
# floating = no tiling slot, no flash. Size is owned by Altus (rememberWindowSize),
# position by the floating-memory daemon.
for_window [app_id="Altus"] floating enable
# nchat (WhatsApp TUI): born hidden in the scratchpad; shown on demand ($mod+m / waybar icon).
for_window [app_id="nchat"] move scratchpad
for_window [instance="lxappearance"] floating enable
for_window [app_id="pamac-manager"] floating enable
for_window [app_id="blueberry.py"] floating enable
for_window [app_id="dragon-drop"] floating enable, sticky enable
for_window [app_id="firefox" title="^Library$"] floating enable, border pixel 3, sticky enable
for_window [app_id="thunderbird" title=".*Reminder"] floating enable
for_window [app_id="floating_shell"] floating enable, border pixel 3, sticky enable
for_window [app_id="Manjaro.manjaro-settings-manager"] floating enable
for_window [app_id="" title="Picture in picture"] floating enable, sticky enable
for_window [app_id="" title="Picture-in-Picture"] floating enable, sticky enable
for_window [instance="around"] floating enable, sticky enable
for_window [app_id="xsensors"] floating enable
for_window [title="Save File"] floating enable
for_window [title="Firefox .*— Sharing Indicator"] floating enable, sticky enable, move to scratchpad
for_window [app_id="" title=".* is sharing your screen."] floating enable
for_window [title="^wlay$"] floating enable
# Pre-place auto-floating apps near the top-right so they never render their
# first frame in the center. floating-placer.service refines this position
# (TR if free, BR/grid/cascade otherwise) the moment the floating event fires.
# Coords are anchored at TR for 1920x1080 with the current workspace gaps;
# floating-placer adjusts for the actual window width.
set $tr_seed move absolute position 1404 56

# added terminal floating when invoked with super+shift+enter
for_window [app_id="floating_terminal_persistent"] floating enable, $tr_seed


# Make file manager floating by default
for_window [app_id="pcmanfm-qt"] floating enable
for_window [app_id="fm"] floating enable

# Float image viewer
for_window [app_id="swayimg"] floating enable, $tr_seed

# Float PDF viewer
for_window [app_id="mupdf"] floating enable, $tr_seed
for_window [class="MuPDF"] floating enable, $tr_seed

# Float video player (mpv) — naked window, no border
for_window [app_id="mpv"] floating enable, border none, $tr_seed
for_window [class="mpv"] floating enable, border none, $tr_seed

# Don't allow applications to inhibit shortcuts, i.e. grab total control of the
# keyboard. Chrome currently abuses this by enabling it for all "--app=..."
# shortcuts.
seat * shortcuts_inhibitor disable
