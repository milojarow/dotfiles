# autostart background applications
exec sh -c "echo '99-autostart-applications.conf ejecutado a $(date)' >> $HOME/.config/sway/autostart.log"

exec /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# autostarts
exec {
    $initialize_way_displays
    $initialize_foot_server
    $initialize_mounting_daemon
    $initialize_poweralert_daemon
    $initialize_workspace_icons
    $initialize_swayr_daemon

    $xdg-dirs
    $autostart_dex
    $flashfocus
    $wlsunset
    $autotiling
    $initialize_cheatsheet
}

# commands that "reload" something
exec_always $cliphist_store  # [Clipboard Functionality] storage daemon
exec_always $cliphist_watch  # [Clipboard Functionality] waybar refresh daemon
exec_always {
    $swappy_notify  # [Screenshots]
    $screenshot_clipboard_notify  # [Screenshots]

#   $apply_background
    $kanshi
    $clip-persist    # [Clipboard Functionality]
#    $mako
    $auto_xdg_keyboard
    $watch_playerctl
    $calendar_daemon
    $enable_noisetorch
    $onscreen_bar --refresh
    $create_rofi_config
    $update_rofi_theme
    $disable_nm_applet_autostart
    $nm_applet
}

# commands that sends signals
exec_always ~/.config/sway/scripts/window-title.sh  # [Window Title]
