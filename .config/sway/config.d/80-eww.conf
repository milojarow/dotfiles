# Start eww at sway startup only — systemd + Restart=always handles crashes.
# Theme changes hot-reload SCSS automatically (eww watches theme.scss for changes).
# IPC deflisten scripts survive sway reloads because the IPC socket persists.
# --no-startup-id: systemctl has no startup notification support, suppresses loading cursor.
exec --no-startup-id systemctl --user start eww.service
