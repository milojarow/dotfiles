# ── Lid Handling ──────────────────────────────────────────────────────────────
# Role:     Maps sway bindswitch lid:on/off events to the lid handler scripts
# Files:    lid-handler.sh · lid-open-handler.sh · lid-bluetooth-reconnect.sh
#           ~/.config/sway/config.d/75-lid-switch.conf
# Requires: HandleLidSwitch=ignore in /etc/systemd/logind.conf
# ─────────────────────────────────────────────────────────────────────────────
# Smart lid handling that doesn't interfere with manual suspend

# Use smart lid handler instead of direct locking
bindswitch --locked lid:on exec '~/.config/sway/scripts/lid-handler.sh'
bindswitch --locked lid:off exec '~/.config/sway/scripts/lid-open-handler.sh'
