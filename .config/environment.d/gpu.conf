# Force VA-API to use Intel iHD driver instead of NVIDIA.
# Prevents libva-nvidia-driver from intercepting video decode requests from browsers.
# With NVIDIA Quadro M1000M having only 2 GB VRAM, routing multiple video streams
# through the NVIDIA driver causes VRAM exhaustion and kernel hard freeze.
LIBVA_DRIVER_NAME=iHD

# Restrict Wayland compositor (sway/wlroots) to the Intel iGPU only.
# Without this, wlroots enumerates all DRM devices and may use the NVIDIA dGPU
# for rendering. If a rolling update upgrades the NVIDIA userspace (nvidia-utils)
# while the running kernel still has the old module in memory, any GPU call through
# the NVIDIA driver causes a hard system crash. Using by-path (PCI address) instead
# of card0/card1 so the mapping survives hardware changes.
# Intel HD 530 is permanently at PCI 0000:00:02.0 on this Dell laptop.
WLR_DRM_DEVICES=/dev/dri/by-path/pci-0000:00:02.0-card
