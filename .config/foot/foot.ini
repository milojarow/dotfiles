# Include the theme configuration (which includes the templates)
include=~/.config/foot/foot-theme.ini  # runtime palette theme — see man palette-theming

[main]
# Use [colors-dark] section from theme file on startup
initial-color-theme=dark  # load [colors-dark] from foot-theme.ini on new window open

# Adjust padding to distribute gaps more evenly in tiling WM
# Format: pad=HORIZONTALxVERTICAL center
pad=4x4 center

# Fix for inner gaps when resizing window:
# By default, foot resizes by character cells, which can leave visible gaps
# between the terminal content and window edges when resizing.
# Setting this to 'no' makes foot resize by pixels instead, eliminating gaps.
resize-by-cells=no

# Mouse selection → PRIMARY only (middle-click paste), kept separate from the
# Ctrl+C/Ctrl+V clipboard so selecting text never pollutes the cliphist history.
# (OSC 52 clipboard writes from remote shells via SSH+tmux are governed by the
# [security] osc52 option — default "enabled" — NOT by this setting.)
selection-target=primary

[key-bindings]
# Disable all key bindings that might interfere with applications
# This prevents foot from capturing special key sequences

[text-bindings]
# Always send the kitty extended key sequence for Shift+Enter.
# Without this, tmux intercepts Shift+Enter and forwards only \r (plain Enter).
# Claude Code already handles \e[13;2u as "insert newline", so this works
# both inside and outside tmux.
\x1b[13;2u=Shift+Return

[mouse]
hide-when-typing=yes

[csd]
# Client-side decorations settings (if needed)

[bell]
# Set window urgency flag on bell character (\a)
# Used by Fish "done" plugin to mark workspace as urgent when commands finish
urgent=yes
# Emit a desktop notification (via notify-send -> mako) on BEL. Claude Code
# (preferredNotifChannel=iterm2_with_bell) rings BEL; foot ignores its OSC 9
# but turns this BEL into a popup, matching Ghostty's behavior.
notify=yes

[desktop-notifications]
# Notify even when the foot window is focused, so Claude Code's "done / needs
# input" ping fires regardless of focus (parity with Ghostty's OSC 9 popups).
inhibit-when-focused=no

[tweak]
# Disable enhanced keyboard protocol (kitty keyboard protocol)
# This prevents Ctrl+G from appearing as [103;5u
# Note: foot doesn't have a direct option to disable this, but we can work around it
