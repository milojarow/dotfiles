context.modules = [
    {   name = libpipewire-module-filter-chain
        flags = [ nofail ]
        args = {
            node.description = "Mic Denoised (rnnoise)"
            media.name       = "Mic Denoised (rnnoise)"
            filter.graph = {
                nodes = [
                    { type = ladspa  name = rnnoise  plugin = /usr/lib/ladspa/librnnoise_ladspa.so
                      label = noise_suppressor_mono
                      control = { "VAD Threshold (%)" = 60.0  "VAD Grace Period (ms)" = 200.0 } }
                ]
            }
            capture.props  = { node.name = "capture.rnnoise_source"  node.passive = true  target.object = "alsa_input.pci-0000_00_1f.3.analog-stereo" }
            playback.props = { node.name = "rnnoise_source"  media.class = Audio/Source  priority.session = 1500 }
        }
    }
]
