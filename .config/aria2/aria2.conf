# aria2 — deliver completed downloads to the MAL local-tracking organizer.
# Read by default from ~/.config/aria2/aria2.conf (unless you pass --conf-path).
dir=/home/milo/torrents
always-resume=true
# On completion, hand the unit to the organizer (it hardlinks into ~/media; the
# download stays here so BT keeps seeding):
on-bt-download-complete=/home/milo/.local/bin/aria2-deliver
on-download-complete=/home/milo/.local/bin/aria2-deliver
